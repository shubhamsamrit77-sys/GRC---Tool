<script>
// ── EDGE FUNCTION URLS (SECURE - Keys hidden!) ──
const EDGE_FUNCTIONS = {
  login: 'https://kqvvqriyaundzefmrqzk.supabase.co/functions/v1/login',
  loadItems: 'https://kqvvqriyaundzefmrqzk.supabase.co/functions/v1/load-items',
  loadLogs: 'https://kqvvqriyaundzefmrqzk.supabase.co/functions/v1/load-logs',
  loadRisks: 'https://kqvvqriyaundzefmrqzk.supabase.co/functions/v1/load-risks',
  addItem: 'https://kqvvqriyaundzefmrqzk.supabase.co/functions/v1/add-item',
  updateItem: 'https://kqvvqriyaundzefmrqzk.supabase.co/functions/v1/update-item'
};

var items=[],logs=[],risks=[],users=[],currentUser=null,currentEmail=null,activeFreq='';
var FL={daily:'Daily',weekly:'Weekly',monthly:'Monthly',quarterly:'Quarterly',halfyearly:'Half-yearly',yearly:'Yearly'};
var RC={admin:'#4f52d9',manager:'#0d9e7e',viewer:'#0369a1',stakeholder:'#e07d1a'};

// ── HELPER FUNCTIONS ──
function $(id){return document.getElementById(id);}
function today(){return new Date().toISOString().split('T')[0];}
function getStatus(it){if(it.done)return'done';if(it.due_date&&it.due_date<today())return'overdue';return'pending';}
function can(a){if(!currentUser)return false;var r=currentUser.role;if(a==='view')return true;if(a==='add')return r==='admin'||r==='manager';if(a==='delete')return r==='admin';if(a==='toggle')return r!=='viewer';return false;}

// ── SECURE API CALLS (using Edge Functions) ──
async function callEdgeFunction(functionName, body) {
  try {
    const response = await fetch(EDGE_FUNCTIONS[functionName], {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    
    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error || 'API Error');
    }
    
    return await response.json();
  } catch (error) {
    console.error('API Error:', error);
    showToast(error.message || 'An error occurred');
    return null;
  }
}

// ── TOAST NOTIFICATIONS ──
function showToast(message, duration = 3000) {
  const toast = document.getElementById('grc-toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, duration);
}

function showDueDateToast(title, message) {
  showToast(message);
}

// ── SLIDE PANELS ──
function openPanel(id){
  var panel=document.getElementById(id);
  var overlay=document.getElementById('panel-overlay');
  if(!panel||!overlay) return;
  panel.classList.add('open');
  overlay.style.display='block';
  document.body.style.overflow='hidden';
  var first=panel.querySelector('input,select,textarea');
  if(first) setTimeout(function(){first.focus();},320);
}

function closePanel(){
  document.querySelectorAll('.slide-panel').forEach(function(p){p.classList.remove('open');});
  var overlay=document.getElementById('panel-overlay');
  if(overlay) overlay.style.display='none';
  document.body.style.overflow='';
}

// ── LOGIN (using Edge Function) ──
document.getElementById('login-btn').onclick=async function(){
  var email=document.getElementById('l-email').value.trim().toLowerCase();
  var pass=document.getElementById('l-pass').value.trim();
  var err=document.getElementById('login-err');
  var btn=document.getElementById('login-btn');
  err.style.display='none';
  
  if(!email||!pass){
    err.textContent='Please enter email and password.';
    err.style.display='block';
    return;
  }
  
  btn.textContent='Connecting...';btn.disabled=true;
  
  try{
    const result = await callEdgeFunction('login', { email, password });
    
    if (!result || !result.user) {
      err.textContent='Invalid email or password. Please try again.';
      err.style.display='block';
      btn.textContent='Sign in to GRC Shield';
      btn.disabled=false;
      return;
    }
    
    currentUser = result.user;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='flex';
    
    var r=currentUser.role;
    var ini=currentUser.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
    document.getElementById('user-av').textContent=ini;
    document.getElementById('user-av').style.background=RC[r]||'#4f52d9';
    document.getElementById('user-nm').textContent=currentUser.name;
    document.getElementById('user-rl').textContent=r.charAt(0).toUpperCase()+r.slice(1);
    document.getElementById('nav-admin').style.display=can('admin')?'flex':'none';
    document.getElementById('admin-sec').style.display=can('admin')?'block':'none';
    document.getElementById('add-item-card').style.display=can('add')?'block':'none';
    document.getElementById('add-risk-card').style.display=can('add')?'block':'none';
    if(!can('email'))document.getElementById('nav-email').style.display='none';
    btn.textContent='Sign in to GRC Shield';btn.disabled=false;
    document.getElementById('ai-float-btn').style.display='flex';
    
    await loadAll();
  }catch(e){
    console.error('Login error:',e);
    err.textContent='Connection failed: '+e.message;
    err.style.display='block';
    btn.textContent='Sign in to GRC Shield';btn.disabled=false;
  }
};

document.getElementById('l-pass').onkeydown=function(e){if(e.key==='Enter')document.getElementById('login-btn').onclick();};
document.getElementById('l-email').onkeydown=function(e){if(e.key==='Enter')document.getElementById('login-btn').onclick();};

document.getElementById('logout-btn').onclick=function(){
  currentUser=null;
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='grid';
  document.getElementById('l-email').value='';
  document.getElementById('l-pass').value='';
};

// ── NAVIGATION ──
var navCfg=[['nav-dash','s-dash','Dashboard','Your compliance overview'],['nav-items','s-items','All Items','Manage compliance tasks'],['nav-overdue','s-overdue','Overdue / Due Soon','Items needing attention'],['nav-import','s-import','Bulk Import','Add multiple items'],['nav-export','s-export','Export Reports','Download data'],['nav-email','s-email','Follow-up Emails','Generate & track emails'],['nav-emailtracker','s-emailtracker','Email Tracker','Track sent emails'],['nav-response','s-response','Response Monitor','Monitor responses'],['nav-risks','s-risks','Risk Register','Manage organizational risks'],['nav-scorecard','s-scorecard','Scorecard','View stakeholder scores'],['nav-portal','s-portal','Self-update Portal','Stakeholder portal'],['nav-admin','s-admin','Manage Users','Add & manage users']];

navCfg.forEach(function(m){
  var btn=document.getElementById(m[0]);if(!btn)return;
  btn.onclick=function(){
    document.querySelectorAll('.sb-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active');});
    btn.classList.add('active');document.getElementById(m[1]).classList.add('active');
    document.getElementById('page-title').textContent=m[2];document.getElementById('page-sub').textContent=m[3];
    if(m[1]==='s-dash')renderDash();if(m[1]==='s-items'){renderFreqFilters();renderItems();}
    if(m[1]==='s-overdue')renderOverdue();if(m[1]==='s-email')renderEmailTab();
    if(m[1]==='s-risks')renderRisks();if(m[1]==='s-admin')loadUsers();if(m[1]==='s-scorecard')renderScorecard();if(m[1]==='s-portal')renderPortal();if(m[1]==='s-response')renderResponseMonitor();
    if(window.innerWidth<=600){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('open');}
  };
});

document.getElementById('ham-btn').onclick=function(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-overlay').classList.toggle('open');};
document.getElementById('sb-overlay').onclick=function(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('open');};

// ── LOAD ALL DATA (using Edge Functions) ──
async function loadAll(){
  try{
    document.getElementById('conn-dot').style.background='#e07d1a';
    document.getElementById('conn-lbl').textContent='Loading...';
    
    // Load items
    const itemsResult = await callEdgeFunction('loadItems', { 
      role: currentUser.role, 
      email: currentUser.email 
    });
    items = itemsResult && itemsResult.items ? itemsResult.items : [];
    
    // Load logs
    const logsResult = await callEdgeFunction('loadLogs', {});
    logs = logsResult && logsResult.logs ? logsResult.logs : [];
    
    // Load risks
    const risksResult = await callEdgeFunction('loadRisks', {});
    risks = risksResult && risksResult.risks ? risksResult.risks : [];
    
    document.getElementById('conn-dot').style.background='#0d9e7e';
    document.getElementById('conn-lbl').style.color='#0d9e7e';
    document.getElementById('conn-lbl').textContent='Live — secure connection';
    
    var ov=items.filter(function(it){return getStatus(it)==='overdue';}).length;
    var ob=document.getElementById('ov-badge');
    if(ob){ob.textContent=ov;ob.style.display=ov>0?'inline-block':'none';}
    
    renderDash();renderFreqFilters();renderItems();renderLog();renderRisks();
    if(can('admin'))loadUsers();
    updateResponseBadge();
    renderDashResponseAlert();
    await loadTrackedEmails();
    renderDashEmailAlert();
    
  }catch(e){
    console.error('loadAll error:',e.message);
    document.getElementById('conn-dot').style.background='#d93f3f';
    document.getElementById('conn-lbl').style.color='#d93f3f';
    document.getElementById('conn-lbl').textContent='Connection error — retrying...';
    setTimeout(function(){
      if(currentUser) loadAll();
    },5000);
  }
}

// ── ADD ITEM (using Edge Function) ──
document.getElementById('add-item-btn').onclick=async function(){
  if(!can('add')){alert('No permission.');return;}
  var name=document.getElementById('i-name').value.trim();
  var stake=document.getElementById('i-stake').value.trim();
  
  if(!name){alert('Please enter a task name.');return;}
  if(!stake){alert('Please enter a stakeholder name.');return;}
  
  var row={
    id:Date.now(),
    name:name,
    stakeholder:stake,
    email:document.getElementById('i-email').value.trim(),
    dept:document.getElementById('i-dept').value.trim(),
    freq:document.getElementById('i-freq').value,
    due_date:document.getElementById('i-due').value,
    category:document.getElementById('i-cat').value,
    notes:document.getElementById('i-notes').value.trim(),
    done:false,
    created_at:new Date().toISOString()
  };
  
  const result = await callEdgeFunction('addItem', row);
  
  if(!result){return;}
  
  ['i-name','i-stake','i-email','i-dept','i-notes','i-due'].forEach(function(id){
    document.getElementById(id).value='';
  });
  
  await loadAll();
  closePanel();
  showDueDateToast('','Compliance item added!');
};

// ── RENDER FUNCTIONS ──
function renderFreqFilters(){
  var freqs=['daily','weekly','monthly','quarterly','halfyearly','yearly'];
  var html='<button class="filter-tag'+(activeFreq===''?' active':'')+'" data-f="">All</button>';
  freqs.forEach(function(f){
    if(items.some(function(it){return it.freq===f;}))
      html+='<button class="filter-tag'+(activeFreq===f?' active':'')+'" data-f="'+f+'">'+FL[f]+'</button>';
  });
  var el=document.getElementById('freq-filters');
  if(!el)return;
  el.innerHTML=html;
  el.querySelectorAll('.filter-tag').forEach(function(b){
    b.onclick=function(){
      activeFreq=b.getAttribute('data-f');
      renderFreqFilters();
      renderItems();
    };
  });
}

function renderItems(){
  var filtered=items;
  if(activeFreq)filtered=items.filter(function(it){return it.freq===activeFreq;});
  var html='';
  filtered.forEach(function(it){
    var st=getStatus(it);
    var badge=st==='done'?'<span class="badge b-done">Done</span>':st==='overdue'?'<span class="badge b-overdue">Overdue</span>':'<span class="badge b-pending">Pending</span>';
    html+='<tr class="item-row"><td>'+it.name+'</td><td>'+it.stakeholder+'</td><td>'+(it.dept||'-')+'</td><td><span class="badge b-'+it.freq+'">'+FL[it.freq]+'</span></td><td>'+(it.due_date||'-')+'</td><td>'+badge+'</td><td><span class="fu-count">0</span></td><td><button class="btn btn-sm" onclick="toggleDone('+it.id+')">'+( it.done?'Undo':'Mark done')+'</button></td></tr>';
  });
  if(!html)html='<tr><td colspan="8" class="empty">No items</td></tr>';
  document.getElementById('items-body').innerHTML=html;
}

function toggleDone(id){
  var it=items.find(function(x){return x.id===id;});
  if(!it)return;
  it.done=!it.done;
  renderItems();
}

function renderDash(){
  var total=items.length;
  var done=items.filter(function(it){return it.done;}).length;
  var overdue=items.filter(function(it){return getStatus(it)==='overdue';}).length;
  var pct=total===0?0:Math.round((done/total)*100);
  document.getElementById('d-total').textContent=total;
  document.getElementById('d-done').textContent=done;
  document.getElementById('d-over').textContent=overdue;
  document.getElementById('d-pct').textContent=pct+'%';
}

function renderOverdue(){
  var overdue=items.filter(function(it){return getStatus(it)==='overdue';});
  var html='';
  overdue.forEach(function(it){
    html+='<tr><td>'+it.name+'</td><td>'+it.stakeholder+'</td><td>'+(it.dept||'-')+'</td><td>'+it.due_date+'</td><td><span class="badge b-overdue">Overdue</span></td><td><button class="btn btn-sm" onclick="toggleDone('+it.id+')">Mark done</button></td></tr>';
  });
  if(!html)html='<tr><td colspan="6" class="empty">No overdue items</td></tr>';
  document.getElementById('overdue-body').innerHTML=html;
}

function renderLog(){
  var html='';
  logs.forEach(function(log){
    html+='<tr><td>'+(log.task_name||'-')+'</td><td>'+(log.stakeholder||'-')+'</td><td>#'+(log.fu_number||'0')+'</td><td>'+(log.date||'-')+'</td><td>'+(log.tone||'-')+'</td><td>'+(log.subject||'-')+'</td></tr>';
  });
  if(!html)html='<tr><td colspan="6" class="empty">No logs</td></tr>';
  document.getElementById('log-body').innerHTML=html;
}

function renderRisks(){
  var html='';
  risks.forEach(function(risk){
    var score=parseInt(risk.likelihood||1)*(parseInt(risk.impact||1));
    var level=score<=4?'Low':score<=9?'Medium':'High';
    html+='<tr><td>'+risk.name+'</td><td>'+risk.category+'</td><td>'+score+'</td><td><span class="badge">'+ level+'</span></td><td>'+risk.owner+'</td><td><span class="badge b-pending">Active</span></td><td><button class="btn btn-sm">View</button></td></tr>';
  });
  if(!html)html='<tr><td colspan="7" class="empty">No risks</td></tr>';
  document.getElementById('risk-body').innerHTML=html;
}
